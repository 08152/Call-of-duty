<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ULTRA FPS ENGINE v4</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
background:#87cfff;
font-family:Arial,Helvetica,sans-serif;
}

/* =========================
   THREE CANVAS
========================= */

canvas{
display:block;
}

/* =========================
   CROSSHAIR
========================= */

#crosshair{
position:absolute;
left:50%;
top:50%;
width:16px;
height:16px;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:1000;
}

#crosshair:before,
#crosshair:after{
content:"";
position:absolute;
background:white;
}

#crosshair:before{
left:7px;
top:0;
width:2px;
height:16px;
}

#crosshair:after{
left:0;
top:7px;
width:16px;
height:2px;
}

/* =========================
   HEALTH
========================= */

#healthBar{
position:absolute;
left:20px;
bottom:20px;

width:280px;
height:20px;

border:2px solid white;
background:rgba(0,0,0,0.3);

z-index:1000;
}

#healthFill{
width:100%;
height:100%;
background:#1e90ff;
transition:.15s;
}

/* =========================
   STAMINA
========================= */

#staminaBar{
position:absolute;
left:20px;
bottom:50px;

width:280px;
height:10px;

border:1px solid white;
background:rgba(0,0,0,0.3);

z-index:1000;
}

#staminaFill{
width:100%;
height:100%;
background:lime;
}

/* =========================
   AMMO
========================= */

#ammo{
position:absolute;

right:20px;
bottom:20px;

font-size:28px;
font-weight:bold;

color:white;

background:rgba(0,0,0,.35);

padding:10px 15px;
border-radius:8px;

z-index:1000;
}

/* =========================
   HITMARKER
========================= */

#hitmarker{
position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

font-size:42px;
font-weight:bold;

color:red;

display:none;

z-index:1200;
pointer-events:none;
}

/* =========================
   DEBUG
========================= */

#debug{
position:absolute;

top:10px;
right:10px;

padding:10px;

background:rgba(0,0,0,.55);

color:#00ff00;

font-size:12px;
line-height:1.4;

border-radius:6px;

white-space:pre;

z-index:1000;
}

/* =========================
   LOADING SCREEN
========================= */

#loading{
position:absolute;
left:0;
top:0;

width:100%;
height:100%;

display:flex;
align-items:center;
justify-content:center;

background:black;
color:white;

font-size:30px;
font-weight:bold;

z-index:9999;
}

</style>
</head>

<body>

<!-- Loading -->
<div id="loading">
ULTRA FPS ENGINE v4
</div>

<!-- Crosshair -->
<div id="crosshair"></div>

<!-- Hitmarker -->
<div id="hitmarker">✖</div>

<!-- Health -->
<div id="healthBar">
<div id="healthFill"></div>
</div>

<!-- Stamina -->
<div id="staminaBar">
<div id="staminaFill"></div>
</div>

<!-- Ammo -->
<div id="ammo">
30 / 30
</div>

<!-- Debug -->
<div id="debug">
Loading...
</div>

<!-- =========================
     IMPORT MAP
========================= -->

<script type="importmap">
{
  "imports": {
    "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "gltfloader":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
  }
}
</script>

<!-- =========================
     MAIN ENTRY
========================= -->

<script type="module" src="./main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FULL FPS ENGINE</title>

<style>
body{margin:0;overflow:hidden;background:#87cfff}

/* crosshair */
#crosshair{
position:absolute;top:50%;left:50%;
width:10px;height:10px;
transform:translate(-50%,-50%);
z-index:10;
}
#crosshair:before,#crosshair:after{
content:"";position:absolute;background:white;
}
#crosshair:before{width:2px;height:10px;left:4px}
#crosshair:after{width:10px;height:2px;top:4px}

/* coords */
#coords{
position:absolute;bottom:10px;right:10px;
color:white;font-family:Arial;font-size:13px;
background:rgba(0,0,0,0.4);
padding:6px;border-radius:6px;white-space:pre;
}

/* health */
#healthBar{
position:absolute;bottom:10px;left:10px;
width:220px;height:18px;
border:2px solid white;background:rgba(0,0,0,0.3);
}
#healthFill{width:100%;height:100%;background:#1e90ff}

/* hitmarker */
#hitmarker{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:40px;color:red;display:none;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="coords"></div>
<div id="healthBar"><div id="healthFill"></div></div>
<div id="hitmarker">✖</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= SCENE =================
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87cfff);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,5000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const sun=new THREE.DirectionalLight(0xffffff,1.5);
sun.position.set(10,20,10);
scene.add(sun);

// ================= GROUND =================
const tex=new THREE.TextureLoader().load(
"https://threejs.org/examples/textures/terrain/grasslight-big.jpg"
);
tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
tex.repeat.set(50,50);

const ground=new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({map:tex})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ================= PLAYER =================
const player=new THREE.Object3D();
scene.add(player);
player.add(camera);
camera.position.set(0,2.2,0);

// ================= STATE =================
let yaw=0,pitch=0;
let velY=0,onGround=true;
let health=100;
let aiming=false;
let reloading=false;

// ================= INPUT =================
const keys={};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// ================= LOOK =================
document.addEventListener("mousemove",(e)=>{
if(document.pointerLockElement!==document.body)return;

yaw-=e.movementX*0.002;
pitch-=e.movementY*0.002;
pitch=Math.max(-1.2,Math.min(1.2,pitch));

player.rotation.y=yaw;
camera.rotation.x=pitch;
});
document.body.addEventListener("click",()=>document.body.requestPointerLock());

// ================= JUMP =================
window.addEventListener("keydown",(e)=>{
if(e.code==="Space"&&onGround){
velY=0.25;onGround=false;
}
});

// ================= GRAVITY =================
function gravity(){
velY-=0.015;
player.position.y+=velY;
if(player.position.y<=0){
player.position.y=0;
velY=0;onGround=true;
}
}

// ================= MOVE =================
function move(){
const speed=0.15;
let dir=new THREE.Vector3();
if(keys["w"])dir.z-=1;
if(keys["s"])dir.z+=1;
if(keys["a"])dir.x-=1;
if(keys["d"])dir.x+=1;

dir.normalize();

const forward=new THREE.Vector3(0,0,-1).applyEuler(player.rotation);
forward.y=0;forward.normalize();

const right=new THREE.Vector3().crossVectors(forward,new THREE.Vector3(0,1,0)).negate();

player.position.addScaledVector(forward,dir.z*speed);
player.position.addScaledVector(right,dir.x*speed);
}

// ================= BARRIERS (REAL MESH HITBOX + SNAP) =================
const loader=new THREE.GLTFLoader();
let barriers=[];

function addBarrier(x,y,z,scale=1){

loader.load("barrier.glb",(gltf)=>{

const obj=gltf.scene.clone();
obj.scale.set(scale,scale,scale);

// SNAP TO GROUND
const ray=new THREE.Raycaster();
ray.set(new THREE.Vector3(x,100,z),new THREE.Vector3(0,-1,0));
const hit=ray.intersectObject(ground);

obj.position.set(x,hit.length?hit[0].point.y:0,z);

scene.add(obj);
barriers.push(obj);

});
}

// positions
addBarrier(-10,-50,-25,1);
addBarrier(14,-50,-41,1);
addBarrier(27,-50,-75,1);

// ================= COLLISION (MESH BASED) =================
function getBox(pos){
return new THREE.Box3().setFromCenterAndSize(
new THREE.Vector3(pos.x,pos.y+1,pos.z),
new THREE.Vector3(0.8,2,0.8)
);
}

function moveCollision(){

const speed=0.15;

let dir=new THREE.Vector3();
if(keys["w"])dir.z-=1;
if(keys["s"])dir.z+=1;
if(keys["a"])dir.x-=1;
if(keys["d"])dir.x+=1;

dir.normalize();

const forward=new THREE.Vector3(0,0,-1).applyEuler(player.rotation);
forward.y=0;forward.normalize();

const right=new THREE.Vector3().crossVectors(forward,new THREE.Vector3(0,1,0)).negate();

const move=new THREE.Vector3();
move.addScaledVector(forward,dir.z*speed);
move.addScaledVector(right,dir.x*speed);

const next=player.position.clone().add(move);

const box=getBox(next);

let blocked=false;

for(const b of barriers){
const meshBox=new THREE.Box3().setFromObject(b);
if(box.intersectsBox(meshBox)) blocked=true;
}

if(!blocked) player.position.copy(next);
}

// ================= WEAPON =================
let weapon;
const shootSound=new Audio("shoot.mp3");
const reloadSound=new Audio("reload.mp3");

loader.load("weapon.glb",(gltf)=>{
weapon=gltf.scene;
camera.add(weapon);
weapon.position.set(0.5,-0.9,-1.2);
});

// ================= ADS =================
const normalFov=75;
const aimFov=28;

// ================= ENEMIES =================
let enemies=[];

function addEnemy(x,y,z){
const e=new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xff0000})
);
e.position.set(x,y,z);
scene.add(e);
enemies.push(e);
}

addEnemy(5,1,-20);
addEnemy(-3,1,-15);

// ================= FX =================
function hitmarker(){
const h=document.getElementById("hitmarker");
h.style.display="block";
setTimeout(()=>h.style.display="none",100);
}

function muzzleFlash(){
if(!weapon)return;
const light=new THREE.PointLight(0xffaa00,2,6);
weapon.add(light);
light.position.set(0,0,-1);
setTimeout(()=>weapon.remove(light),50);
}

// ================= SHOOT =================
const raycaster=new THREE.Raycaster();

function shoot(){

if(reloading)return;

raycaster.setFromCamera(new THREE.Vector2(0,0),camera);
const hits=raycaster.intersectObjects(enemies);

if(hits.length){
const e=hits[0].object;
e.health=(e.health||100)-25;
hitmarker();
if(e.health<=0){
scene.remove(e);
enemies=enemies.filter(x=>x!==e);
}
}

shootSound.currentTime=0;
shootSound.play();
setTimeout(()=>shootSound.pause(),250);

muzzleFlash();
}

// ================= RELOAD =================
function reload(){
if(reloading)return;
reloading=true;

reloadSound.currentTime=0;
reloadSound.play();

let t=0;
const base=new THREE.Vector3(0.5,-0.9,-1.2);
const back=new THREE.Vector3(0.2,-0.6,-0.6);

function anim(){
if(t<1){
weapon.position.lerpVectors(base,back,t);
t+=0.05;
requestAnimationFrame(anim);
}else{
setTimeout(()=>{
let t2=0;
function backAnim(){
if(t2<1){
weapon.position.lerpVectors(back,base,t2);
t2+=0.05;
requestAnimationFrame(backAnim);
}else reloading=false;
}
backAnim();
},200);
}
}
anim();
}

// ================= INPUT =================
window.addEventListener("mousedown",(e)=>{
if(e.button===2)aiming=true;
if(e.button===0)shoot();
});

window.addEventListener("mouseup",e=>{
if(e.button===2)aiming=false;
});

window.addEventListener("keydown",(e)=>{
if(e.key==="r")reload();
});

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

moveCollision();
gravity();

camera.position.y+=(2.2+player.position.y-camera.position.y)*0.15;

const targetFov=aiming?aimFov:normalFov;
camera.fov+=(targetFov-camera.fov)*0.15;
camera.updateProjectionMatrix();

if(weapon){
weapon.position.lerp(
aiming?
new THREE.Vector3(0,-0.35,-0.45):
new THREE.Vector3(0.5,-0.9,-1.2),
0.15
);
}

const dir=new THREE.Vector3(0,0,-1).applyEuler(player.rotation);

document.getElementById("coords").innerHTML=
`X:${player.position.x.toFixed(2)}
Y:${player.position.y.toFixed(2)}
Z:${player.position.z.toFixed(2)}

DIR X:${dir.x.toFixed(2)}
DIR Z:${dir.z.toFixed(2)}`;

document.getElementById("healthFill").style.width=health+"%";

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS Shooter</title>

<style>
body { margin:0; overflow:hidden; background:#87cfff; }

#crosshair{
  position:absolute;
  top:50%;
  left:50%;
  width:10px;
  height:10px;
  transform:translate(-50%,-50%);
  z-index:10;
}

#crosshair:before, #crosshair:after{
  content:"";
  position:absolute;
  background:white;
}

#crosshair:before{ width:2px;height:10px;left:4px;top:0; }
#crosshair:after{ width:10px;height:2px;left:0;top:4px; }

#coords{
  position:absolute;
  bottom:10px;
  right:10px;
  color:white;
  font-family:Arial;
  font-size:14px;
  z-index:10;
  background:rgba(0,0,0,0.35);
  padding:8px;
  border-radius:6px;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="coords"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87cfff);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const sun = new THREE.DirectionalLight(0xffffff,1.5);
sun.position.set(10,20,10);
scene.add(sun);

// ================= GROUND =================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshStandardMaterial({color:0x3fa34d})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ================= PLAYER =================
const player = new THREE.Object3D();
player.position.set(0,2,5);
scene.add(player);

player.add(camera);
camera.position.set(0,2.2,0);

// ================= PHYSICS =================
let velocityY = 0;
const gravity = -0.02;
let canJump = false;

// ================= BARRIERS =================
const barriers = [];
const barrierBoxes = [];

function createBarrier(x,z){
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(2,2,2),
    new THREE.MeshStandardMaterial({color:0x555555})
  );

  // 🔥 tiefer in Boden setzen
  mesh.position.set(x,0.5,z);
  scene.add(mesh);

  barriers.push(mesh);

  const box = new THREE.Box3().setFromObject(mesh);
  barrierBoxes.push(box);
}

createBarrier(5,0);
createBarrier(-5,0);
createBarrier(0,-8);

// ================= INPUT =================
const keys = {};

window.addEventListener("keydown",(e)=>{
  keys[e.key.toLowerCase()] = true;

  // JUMP
  if(e.code === "Space" && canJump){
    velocityY = 0.25;
    canJump = false;
  }
});

window.addEventListener("keyup",(e)=>{
  keys[e.key.toLowerCase()] = false;
});

// ================= LOOK =================
let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove",(e)=>{
  if(document.pointerLockElement !== document.body) return;

  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;

  pitch = Math.max(-1.2,Math.min(1.2,pitch));

  player.rotation.y = yaw;
  camera.rotation.x = pitch;
});

document.body.addEventListener("click",()=>{
  document.body.requestPointerLock();
});

// ================= MOVE + COLLISION =================
function move(){

  const speed = 0.12;

  const dir = new THREE.Vector3();

  if(keys["w"]) dir.z -= 1;
  if(keys["s"]) dir.z += 1;
  if(keys["a"]) dir.x -= 1;
  if(keys["d"]) dir.x += 1;

  dir.normalize();

  const forward = new THREE.Vector3(0,0,-1).applyEuler(player.rotation);
  forward.y = 0;
  forward.normalize();

  const right = new THREE.Vector3().crossVectors(forward,new THREE.Vector3(0,1,0)).negate();

  let nextPos = player.position.clone();

  nextPos.addScaledVector(forward,dir.z*speed);
  nextPos.addScaledVector(right,dir.x*speed);

  // 🔥 collision check
  const testBox = new THREE.Box3().setFromCenterAndSize(
    nextPos.clone().add(new THREE.Vector3(0,1,0)),
    new THREE.Vector3(1,2,1)
  );

  let blocked = false;

  for(const box of barrierBoxes){
    if(testBox.intersectsBox(box)){
      blocked = true;
      break;
    }
  }

  if(!blocked){
    player.position.copy(nextPos);
  }
}

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  move();

  // GRAVITY
  velocityY += gravity;
  player.position.y += velocityY;

  // FLOOR
  if(player.position.y < 2){
    player.position.y = 2;
    velocityY = 0;
    canJump = true;
  }

  // update hitboxes
  for(let i=0;i<barriers.length;i++){
    barrierBoxes[i].setFromObject(barriers[i]);
  }

  document.getElementById("coords").innerHTML =
  `X:${player.position.x.toFixed(2)}<br>
   Y:${player.position.y.toFixed(2)}<br>
   Z:${player.position.z.toFixed(2)}`;

  renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>

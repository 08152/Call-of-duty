<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS Shooter</title>

<style>
body { margin:0; overflow:hidden; background:#87cfff; }

#crosshair{
  position:absolute;
  top:50%;
  left:50%;
  width:10px;
  height:10px;
  transform:translate(-50%,-50%);
  z-index:10;
}
#crosshair:before, #crosshair:after{
  content:"";
  position:absolute;
  background:white;
}
#crosshair:before{ width:2px;height:10px;left:4px;top:0; }
#crosshair:after{ width:10px;height:2px;left:0;top:4px; }

#coords{
  position:absolute;
  bottom:10px;
  right:10px;
  color:white;
  font-family:Arial;
  font-size:14px;
  z-index:10;
  text-align:right;
  background:rgba(0,0,0,0.35);
  padding:8px;
  border-radius:6px;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="coords"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87cfff);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.2));
const sun = new THREE.DirectionalLight(0xffffff,1.5);
sun.position.set(10,20,10);
scene.add(sun);

// ================= GROUND =================
const tex = new THREE.TextureLoader().load(
  "https://threejs.org/examples/textures/terrain/grasslight-big.jpg"
);
tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
tex.repeat.set(50,50);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(5000,5000),
  new THREE.MeshStandardMaterial({map:tex})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ================= PLAYER =================
const player = new THREE.Object3D();
player.position.set(0,0,0);
scene.add(player);

player.add(camera);
camera.position.set(0,2.2,0);

// ================= WEAPON =================
let weapon;
const loader = new THREE.GLTFLoader();

loader.load("weapon.glb",(gltf)=>{
  weapon = gltf.scene;
  camera.add(weapon);
  weapon.position.set(0.5,-0.9,-1.2);
});

// ================= SOUND =================
const shootSound = new Audio("shoot.mp3");
const reloadSound = new Audio("reload.mp3");

function playShoot(){
  shootSound.pause();
  shootSound.currentTime = 0;
  shootSound.play();
  setTimeout(()=>shootSound.pause(),250);
}

function playReload(){
  reloadSound.currentTime = 0;
  reloadSound.play();
}

// ================= LOOK =================
let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove",(e)=>{
  if(document.pointerLockElement !== document.body) return;

  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;

  pitch = Math.max(-1.2,Math.min(1.2,pitch));

  player.rotation.y = yaw;
  camera.rotation.x = pitch;
});

document.body.addEventListener("click",()=>{
  document.body.requestPointerLock();
});

// ================= INPUT =================
const keys = {};
window.addEventListener("keydown",(e)=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",(e)=>keys[e.key.toLowerCase()]=false);

// ================= GRAVITY + JUMP =================
let velocityY = 0;
let onGround = true;

window.addEventListener("keydown",(e)=>{
  if(e.code==="Space" && onGround){
    velocityY = 0.25;
    onGround = false;
  }
});

function applyGravity(){
  velocityY -= 0.015;
  player.position.y += velocityY;

  if(player.position.y <= 0){
    player.position.y = 0;
    velocityY = 0;
    onGround = true;
  }
}

// ================= BARRIERS =================
const gltfLoader = new THREE.GLTFLoader();
let barriers = [];
let barrierBoxes = [];

function addBarrier(x,y,z){

  gltfLoader.load("barrier.glb",(gltf)=>{

    const obj = gltf.scene;

    obj.scale.set(1,1,1);

    // 🔥 Pivot Fix
    const box = new THREE.Box3().setFromObject(obj);
    const center = box.getCenter(new THREE.Vector3());

    obj.position.sub(center);
    obj.position.add(new THREE.Vector3(x,y,z));

    scene.add(obj);

    barriers.push(obj);
    barrierBoxes.push(new THREE.Box3());
  });
}

// YOUR POSITIONS
addBarrier(0.10,0,-50);
addBarrier(-20,0,-50);
addBarrier(-20,0,-60);
addBarrier(-15.04,0,-37.43);
addBarrier(8.12,0,-38.22);

// ================= COLLISION (CAPSULE + SLIDING) =================
function getPlayerBox(pos){
  return new THREE.Box3().setFromCenterAndSize(
    new THREE.Vector3(pos.x,pos.y+1.0,pos.z),
    new THREE.Vector3(0.8,2.0,0.8)
  );
}

function move(){

  const speed = 0.15;

  const dir = new THREE.Vector3();
  if(keys["w"]) dir.z -= 1;
  if(keys["s"]) dir.z += 1;
  if(keys["a"]) dir.x -= 1;
  if(keys["d"]) dir.x += 1;

  dir.normalize();

  const forward = new THREE.Vector3(0,0,-1).applyEuler(player.rotation);
  forward.y = 0;
  forward.normalize();

  const right = new THREE.Vector3().crossVectors(forward,new THREE.Vector3(0,1,0)).negate();

  const moveVec = new THREE.Vector3();
  moveVec.addScaledVector(forward,dir.z*speed);
  moveVec.addScaledVector(right,dir.x*speed);

  const next = player.position.clone().add(moveVec);

  const playerBox = getPlayerBox(next);

  let collision = false;

  for(let i=0;i<barriers.length;i++){
    barrierBoxes[i].setFromObject(barriers[i]);

    if(playerBox.intersectsBox(barrierBoxes[i])){
      collision = true;
      break;
    }
  }

  if(!collision){
    player.position.copy(next);
  } else {

    // SLIDE X
    const slideX = player.position.clone();
    slideX.x = next.x;

    // SLIDE Z
    const slideZ = player.position.clone();
    slideZ.z = next.z;

    if(!getPlayerBox(slideX).intersectsBox(barrierBoxes[0])){
      player.position.x = slideX.x;
    }

    if(!getPlayerBox(slideZ).intersectsBox(barrierBoxes[0])){
      player.position.z = slideZ.z;
    }
  }
}

// ================= SHOOT =================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(0,0);

function shoot(){

  raycaster.setFromCamera(mouse,camera);

  const origin = camera.getWorldPosition(new THREE.Vector3());
  raycaster.set(origin, raycaster.ray.direction);

  raycaster.intersectObjects(scene.children,true);

  if(weapon){
    const light = new THREE.PointLight(0xffaa00,2,5);
    weapon.add(light);
    light.position.set(0,0,-1);
    setTimeout(()=>weapon.remove(light),50);
  }

  playShoot();
}

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  move();
  applyGravity();

  const camY = 2.2 + player.position.y;
  camera.position.y += (camY-camera.position.y)*0.15;

  if(weapon){
    weapon.position.lerp(new THREE.Vector3(0.5,-0.9,-1.2),0.15);
  }

  const dir = new THREE.Vector3(0,0,-1).applyEuler(player.rotation);

  document.getElementById("coords").innerHTML =
  `X:${player.position.x.toFixed(2)}<br>
   Y:${player.position.y.toFixed(2)}<br>
   Z:${player.position.z.toFixed(2)}`;

  renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
